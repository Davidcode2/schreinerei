name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/schreinerei_test

jobs:
  check-for-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      contract: ${{ steps.filter.outputs.contract }}
      shared: ${{ steps.filter.outputs.shared }}
      frontend_image: ${{ steps.filter.outputs.frontend_image }}
      backend_image: ${{ steps.filter.outputs.backend_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'dockerfile.frontend'
              - 'nginx.conf'
            backend:
              - 'src/**'
              - 'migrations/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'dockerfile.backend'
            contract:
              - 'frontend/src/types/generated.ts'
              - 'src/common/**'
              - 'src/modules/**/api/**'
              - 'src/modules/iam/domain/user_preferences.rs'
              - 'src/modules/inventory/domain/stock_entry.rs'
            shared:
              - '.github/workflows/**'
              - '.dockerignore'
            frontend_image:
              - 'dockerfile.frontend'
              - 'nginx.conf'
              - '.dockerignore'
            backend_image:
              - 'dockerfile.backend'
              - '.dockerignore'

  test:
    runs-on: ubuntu-latest
    needs: check-for-changes
    if: needs.check-for-changes.outputs.backend == 'true' || needs.check-for-changes.outputs.shared == 'true'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schreinerei_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply database migrations for SQLx checks
        run: |
          for file in migrations/*.sql; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file"
          done

      - name: Run tests
        run: cargo test --all

      - name: Export TypeScript types
        run: cargo export-types

      - name: Check generated TypeScript types
        run: |
          if ! git diff --exit-code frontend/src/types/generated.ts; then
            echo "ERROR: TypeScript types are out of date!"
            echo "Run: cargo export-types"
            echo "Then commit the updated frontend/src/types/generated.ts"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    needs: check-for-changes
    if: needs.check-for-changes.outputs.backend == 'true' || needs.check-for-changes.outputs.shared == 'true'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schreinerei_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply database migrations for SQLx checks
        run: |
          for file in migrations/*.sql; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file"
          done

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  frontend-check:
    runs-on: ubuntu-latest
    needs: check-for-changes
    if: needs.check-for-changes.outputs.frontend == 'true' || needs.check-for-changes.outputs.contract == 'true' || needs.check-for-changes.outputs.shared == 'true'
    env:
      VITE_KEYCLOAK_URL: https://auth.jakob-lingel.dev
      VITE_KEYCLOAK_REALM: schreinerei
      VITE_KEYCLOAK_CLIENT_ID: schreinerei_pwa_prod
      VITE_API_URL: https://schreinerei.jakob-lingel.dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test:run

      - name: Run frontend build
        working-directory: frontend
        run: npm run build

  backend-image-check:
    runs-on: ubuntu-latest
    needs: check-for-changes
    if: needs.check-for-changes.outputs.backend_image == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f dockerfile.backend -t schreinerei-backend-check .

  frontend-image-check:
    runs-on: ubuntu-latest
    needs: check-for-changes
    if: needs.check-for-changes.outputs.frontend_image == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          docker build \
            -f dockerfile.frontend \
            --build-arg VITE_KEYCLOAK_URL=https://auth.jakob-lingel.dev \
            --build-arg VITE_KEYCLOAK_REALM=schreinerei \
            --build-arg VITE_KEYCLOAK_CLIENT_ID=schreinerei_pwa_prod \
            --build-arg VITE_API_URL=https://schreinerei.jakob-lingel.dev \
            -t schreinerei-frontend-check .
